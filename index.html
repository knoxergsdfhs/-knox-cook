<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
<meta name="theme-color" content="#fff8f0" />
<title>Cook — public AI recipe library</title>
<link rel="manifest" href="/manifest.json" />
<link rel="icon" type="image/svg+xml" href="/icon.svg" />
<style>
  :root {
    --bg: #fff8f0;
    --bg-2: #fffaf2;
    --card: #ffffff;
    --text: #1f1109;
    --muted: #78716c;
    --muted-2: #a8a29e;
    --border: #f3e8d9;
    --border-soft: #f9f0e1;
    --primary: #dc2626;
    --primary-2: #fbbf24;
    --accent: #b45309;
  }
  *, *::before, *::after { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; min-height: 100vh; background: var(--bg); color: var(--text); font-family: "Inter", ui-sans-serif, system-ui, -apple-system, sans-serif; font-size: 14px; line-height: 1.5; -webkit-font-smoothing: antialiased; }
  button { font-family: inherit; }
  a { color: var(--accent); }
  .top { background: white; border-bottom: 1px solid var(--border); position: sticky; top: 0; z-index: 30; }
  .top-inner { max-width: 1080px; margin: 0 auto; padding: 14px 20px; display: flex; align-items: center; gap: 16px; }
  .brand { display: flex; align-items: center; gap: 10px; flex-shrink: 0; cursor: pointer; }
  .brand-mark { width: 38px; height: 38px; border-radius: 10px; background: linear-gradient(135deg, var(--primary-2), var(--primary)); display: grid; place-items: center; }
  .brand-mark svg { width: 20px; height: 20px; }
  .brand-text { font-size: 19px; font-weight: 800; letter-spacing: -0.6px; color: var(--text); }
  .brand-text small { display: block; font-size: 11px; color: var(--muted); font-weight: 500; letter-spacing: 0; margin-top: 1px; }
  .search-input { flex: 1; max-width: 520px; padding: 10px 16px 10px 40px; border-radius: 999px; border: 1px solid var(--border); background: var(--bg); color: var(--text); font-size: 14px; font-family: inherit;
    background-image: url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='none' stroke='%23a8a29e' stroke-width='2' stroke-linecap='round' stroke-linejoin='round'><circle cx='11' cy='11' r='8'/><line x1='21' y1='21' x2='16.65' y2='16.65'/></svg>");
    background-repeat: no-repeat; background-position: 12px center; background-size: 18px; }
  .search-input:focus { outline: none; border-color: var(--primary); }
  .top-btns { display: flex; gap: 8px; align-items: center; }
  .btn { padding: 9px 16px; border-radius: 10px; border: none; cursor: pointer; font-weight: 600; font-size: 13px; font-family: inherit; display: inline-flex; align-items: center; justify-content: center; gap: 6px; transition: all 0.12s; }
  .btn-primary { background: linear-gradient(135deg, var(--primary), var(--primary-2)); color: white; }
  .btn-primary:hover { transform: translateY(-1px); box-shadow: 0 6px 18px rgba(220,38,38,0.3); }
  .btn-secondary { background: white; border: 1px solid var(--border); color: var(--text); }
  .btn-secondary:hover { border-color: var(--primary); }
  .btn-ghost { background: transparent; border: none; color: var(--muted); padding: 8px 10px; cursor: pointer; font-size: 13px; }
  .btn-ghost:hover { color: var(--text); }
  .btn:disabled { opacity: 0.55; cursor: not-allowed; transform: none; box-shadow: none; }
  .spinner { display: inline-block; width: 12px; height: 12px; border: 2px solid currentColor; border-right-color: transparent; border-radius: 50%; animation: spin 0.7s linear infinite; }
  @keyframes spin { to { transform: rotate(360deg); } }
  .main { max-width: 1080px; margin: 0 auto; padding: 24px 20px 80px; }
  .page-title { font-size: 28px; font-weight: 800; margin-bottom: 4px; letter-spacing: -0.8px; }
  .page-sub { color: var(--muted); margin-bottom: 18px; font-size: 14px; }
  /* Generate / Import bar */
  .compose { background: white; border: 1px solid var(--border); border-radius: 16px; padding: 16px; margin-bottom: 22px; }
  .compose-row { display: flex; gap: 8px; align-items: stretch; }
  .compose-row input[type="text"] { flex: 1; padding: 10px 14px; border-radius: 10px; border: 1px solid var(--border); background: var(--bg); color: var(--text); font-size: 14px; font-family: inherit; }
  .compose-row input:focus { outline: none; border-color: var(--primary); }
  .compose-row .btn { flex-shrink: 0; }
  .compose-tabs { display: flex; gap: 4px; margin-bottom: 10px; }
  .compose-tab { background: transparent; border: none; padding: 6px 12px; border-radius: 8px; font-size: 13px; color: var(--muted); cursor: pointer; font-family: inherit; font-weight: 600; }
  .compose-tab.active { background: rgba(220,38,38,0.1); color: var(--primary); }
  .examples { display: flex; flex-wrap: wrap; gap: 6px; margin-top: 10px; }
  .ex-chip { background: var(--bg); border: 1px solid var(--border); border-radius: 999px; padding: 5px 12px; font-size: 12px; color: var(--muted); cursor: pointer; font-family: inherit; }
  .ex-chip:hover { color: var(--text); border-color: var(--primary); }
  /* Recipe grid */
  .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 14px; }
  .card { background: white; border: 1px solid var(--border); border-radius: 14px; overflow: hidden; cursor: pointer; transition: all 0.15s; display: flex; flex-direction: column; }
  .card:hover { border-color: var(--primary); transform: translateY(-2px); box-shadow: 0 10px 24px rgba(220,38,38,0.1); }
  .card-cover { aspect-ratio: 16/10; background: linear-gradient(135deg, #fde68a, #fca5a5); display: grid; place-items: center; color: white; font-size: 38px; font-weight: 800; }
  .card-body { padding: 14px; }
  .card-title { font-size: 15px; font-weight: 700; margin-bottom: 4px; letter-spacing: -0.2px; }
  .card-desc { font-size: 12px; color: var(--muted); line-height: 1.45; min-height: 36px; }
  .card-meta { display: flex; gap: 10px; margin-top: 10px; font-size: 11px; color: var(--muted); flex-wrap: wrap; }
  .card-tag { background: var(--bg); border: 1px solid var(--border); border-radius: 999px; padding: 1px 8px; font-size: 10px; color: var(--accent); font-weight: 600; }
  .empty { text-align: center; padding: 60px 20px; color: var(--muted); }
  .empty-icon { font-size: 48px; margin-bottom: 14px; }
  .empty h2 { color: var(--text); margin-bottom: 8px; font-size: 18px; }
  /* Recipe view */
  .recipe-page { background: white; border: 1px solid var(--border); border-radius: 18px; padding: 0; overflow: hidden; }
  .recipe-hero { padding: 28px 32px 22px; background: linear-gradient(135deg, #fef3c7 0%, #fde68a 100%); }
  .recipe-title { font-size: 32px; font-weight: 800; letter-spacing: -1px; margin-bottom: 6px; }
  .recipe-desc { font-size: 14px; color: var(--muted); margin-bottom: 14px; max-width: 700px; }
  .recipe-stats { display: flex; gap: 16px; flex-wrap: wrap; font-size: 12px; }
  .stat { background: white; padding: 6px 12px; border-radius: 999px; border: 1px solid var(--border); }
  .stat strong { font-size: 13px; }
  .recipe-tags { margin-top: 14px; display: flex; gap: 4px; flex-wrap: wrap; }
  .recipe-tags .card-tag { font-size: 11px; padding: 3px 10px; }
  .recipe-body { padding: 28px 32px; display: grid; grid-template-columns: 280px 1fr; gap: 36px; }
  @media (max-width: 720px) { .recipe-body { grid-template-columns: 1fr; gap: 20px; } .recipe-hero { padding: 20px; } .recipe-body { padding: 20px; } .recipe-title { font-size: 24px; } }
  .section-title { font-size: 13px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.5px; color: var(--accent); margin-bottom: 10px; }
  .ingredients li, .equipment li, .tips li { padding: 6px 0; border-bottom: 1px solid var(--border-soft); font-size: 14px; }
  .ingredients li:last-child, .equipment li:last-child, .tips li:last-child { border-bottom: none; }
  .ing-qty { font-weight: 700; color: var(--accent); margin-right: 6px; }
  .ing-notes { font-size: 12px; color: var(--muted); margin-left: 4px; }
  ol.steps { padding-left: 0; list-style: none; counter-reset: step; }
  ol.steps li { padding: 14px 18px 14px 50px; margin-bottom: 8px; background: var(--bg-2); border-radius: 12px; counter-increment: step; position: relative; line-height: 1.6; font-size: 14px; }
  ol.steps li::before { content: counter(step); position: absolute; left: 14px; top: 14px; width: 26px; height: 26px; background: linear-gradient(135deg, var(--primary), var(--primary-2)); color: white; border-radius: 50%; display: grid; place-items: center; font-weight: 800; font-size: 13px; }
  .recipe-actions { display: flex; gap: 8px; padding: 18px 32px; border-top: 1px solid var(--border); background: var(--bg-2); flex-wrap: wrap; }
  /* Refine chat */
  .refine-shell { padding: 18px 32px; border-top: 1px solid var(--border); }
  .refine-input-row { display: flex; gap: 8px; margin-top: 8px; }
  .refine-input-row input { flex: 1; padding: 10px 14px; border-radius: 10px; border: 1px solid var(--border); background: var(--bg); font-size: 13px; font-family: inherit; }
  .refine-input-row input:focus { outline: none; border-color: var(--primary); }
  .refine-suggestions { display: flex; flex-wrap: wrap; gap: 6px; margin-top: 8px; }
  .refine-suggestions .ex-chip { font-size: 11px; }
  /* Editor */
  .edit-shell { padding: 18px 32px; border-top: 1px solid var(--border); }
  .edit-row { display: flex; gap: 8px; margin-bottom: 10px; align-items: center; }
  .edit-row label { font-size: 11px; color: var(--muted); width: 80px; flex-shrink: 0; }
  .edit-row input, .edit-row textarea { flex: 1; padding: 8px 12px; border-radius: 8px; border: 1px solid var(--border); background: var(--bg); font-size: 13px; font-family: inherit; }
  textarea { resize: vertical; }
  .gen-progress { margin-top: 10px; }
  .gen-progress-bar { height: 3px; background: var(--bg); border-radius: 999px; overflow: hidden; }
  .gen-progress-fill { height: 100%; background: linear-gradient(90deg, var(--primary), var(--primary-2)); width: 5%; transition: width 0.6s ease; border-radius: 999px; }
  .gen-progress-msg { font-size: 12px; color: var(--muted); margin-top: 5px; text-align: center; }
  .toast { position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%); padding: 12px 18px; border-radius: 12px; font-size: 13px; z-index: 9999; box-shadow: 0 10px 30px rgba(0,0,0,0.18); max-width: 520px; text-align: center; display: none; border: 1px solid; }
  /* Favorites & ratings */
  .fave-btn { position:absolute; top:8px; right:8px; background:rgba(255,255,255,0.88); border:none; border-radius:50%; width:32px; height:32px; display:grid; place-items:center; cursor:pointer; font-size:16px; transition:transform 0.18s; z-index:2; }
  .fave-btn:hover { transform:scale(1.25); }
  .stars { display:flex; gap:2px; margin-top:6px; }
  .star { font-size:16px; cursor:pointer; transition:transform 0.1s; line-height:1; }
  .star:hover { transform:scale(1.25); }
  .diff-badge { display:inline-block; padding:2px 8px; border-radius:999px; font-size:10px; font-weight:700; text-transform:uppercase; letter-spacing:0.5px; }
  .diff-easy { background:#dcfce7; color:#166534; }
  .diff-medium { background:#fef3c7; color:#92400e; }
  .diff-hard { background:#fee2e2; color:#991b1b; }
  .filter-tabs { display:flex; gap:4px; margin-bottom:14px; flex-wrap:wrap; }
  .filter-tab { padding:6px 14px; border-radius:999px; border:1px solid var(--border); background:white; font-size:12px; font-weight:600; cursor:pointer; font-family:inherit; color:var(--muted); transition:all 0.12s; }
  .filter-tab.active { background:var(--primary); color:white; border-color:var(--primary); }
  .filter-tab:hover:not(.active) { border-color:var(--primary); color:var(--text); }
  .card-cover { position:relative; }
  .recipe-count-badge { background:var(--bg); border:1px solid var(--border); border-radius:999px; padding:4px 12px; font-size:12px; font-weight:600; color:var(--muted); }
  /* Ingredient checkboxes */
  .ing-label { display:flex; align-items:flex-start; gap:8px; padding:6px 0; border-bottom:1px solid var(--border-soft); cursor:pointer; font-size:14px; }
  .ing-label input[type=checkbox] { margin-top:2px; width:16px; height:16px; accent-color:var(--primary); flex-shrink:0; }
  .ing-label.checked .ing-name { text-decoration:line-through; color:var(--muted-2); }
  .ing-progress { font-size:11px; color:var(--muted); font-weight:600; margin-bottom:8px; }
  /* Note field */
  .recipe-note-area { width:100%; padding:10px 12px; border:1px dashed var(--border); border-radius:8px; background:var(--bg); font-family:inherit; font-size:13px; resize:vertical; color:var(--text); min-height:64px; }
  .recipe-note-area:focus { outline:none; border-color:var(--accent); border-style:solid; }
  /* Dark mode */
  .dark-mode-btn { background:transparent; border:1px solid var(--border); border-radius:8px; padding:5px 9px; cursor:pointer; font-size:15px; line-height:1; }
  [data-theme="dark"] { --bg:#0f0a06; --bg-2:#1a1208; --card:#1f1510; --text:#faf5ef; --muted:#a8a29e; --muted-2:#78716c; --border:#3a2a1a; --border-soft:#2a1f14; }
  [data-theme="dark"] .top, [data-theme="dark"] .card, [data-theme="dark"] .compose, [data-theme="dark"] .recipe-page, [data-theme="dark"] .btn-secondary, [data-theme="dark"] .search-input { background:var(--card) !important; border-color:var(--border); color:var(--text); }
  [data-theme="dark"] body { background:var(--bg); }
  /* Back to top */
  .back-to-top { position:fixed; bottom:76px; right:20px; width:40px; height:40px; border-radius:50%; background:var(--primary); color:white; border:none; cursor:pointer; font-size:18px; display:none; place-items:center; box-shadow:0 4px 12px rgba(220,38,38,0.32); z-index:100; }
  .back-to-top.visible { display:grid; }
  /* Print */
  @media print {
    .top, .compose, .recipe-actions, .refine-shell, .back-to-top, #toast, [data-vary], .filter-tabs, .might-like, .recipe-note-section { display:none !important; }
    body, .main { padding:0 !important; max-width:100% !important; }
    .recipe-page { border:none !important; box-shadow:none !important; border-radius:0 !important; }
    .recipe-hero { background:#fff !important; padding:20px 0 !important; }
    ol.steps li { background:#fff !important; border:1px solid #eee; }
    ol.steps li::before { background:#333 !important; -webkit-print-color-adjust:exact; print-color-adjust:exact; }
    .card-cover { display:none !important; }
  }
  /* Search highlight */
  mark { background:#fef08a; padding:0 2px; border-radius:2px; font-style:normal; }
  /* Might also like */
  .might-like { padding:18px 32px; border-top:1px solid var(--border); }
  .might-like-grid { display:flex; gap:10px; flex-wrap:wrap; margin-top:10px; }
  .might-like-card { background:var(--bg-2); border:1px solid var(--border); border-radius:10px; padding:10px 14px; cursor:pointer; flex:1; min-width:160px; max-width:220px; transition:all 0.12s; }
  .might-like-card:hover { border-color:var(--primary); transform:translateY(-1px); }
  .might-like-card .mlt { font-weight:700; font-size:13px; margin-bottom:2px; }
  .might-like-card .mlm { font-size:11px; color:var(--muted); }
  /* Cuisine chips */
  .cuisine-chips { display:flex; flex-wrap:wrap; gap:4px; margin-top:8px; }
  .cuisine-chip { background:var(--bg); border:1px solid var(--border); border-radius:999px; padding:4px 10px; font-size:11px; color:var(--muted); cursor:pointer; font-family:inherit; transition:all 0.1s; }
  .cuisine-chip.selected { background:var(--primary); color:white; border-color:var(--primary); }
  /* Nutrition bars */
  .nut-bar-wrap { margin-top:4px; }
  .nut-bar { height:6px; border-radius:999px; background:var(--border); overflow:hidden; margin-top:3px; }
  .nut-bar-fill { height:100%; border-radius:999px; transition:width 0.6s ease; }
</style>
</head>
<body>

<div class="top">
  <div class="top-inner">
    <div class="brand" id="brand">
      <div class="brand-mark">
        <svg viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round">
          <path d="M7 11h10l-1 8a1 1 0 0 1-1 1H9a1 1 0 0 1-1-1l-1-8z"/>
          <path d="M7 11a2 2 0 0 1-2-2V6"/>
          <path d="M17 11a2 2 0 0 0 2-2V6"/>
        </svg>
      </div>
      <div class="brand-text">Cook<small>public AI recipes</small></div>
    </div>
    <input type="text" class="search-input" id="search" placeholder="Search recipes..." />
    <div class="top-btns">
      <button class="dark-mode-btn" id="dark-btn" title="Toggle dark mode">🌙</button>
      <button class="btn btn-secondary" id="account-btn">Sign in</button>
    </div>
  </div>
</div>

<div class="main" id="main"></div>

<script type="module">
const API = "https://life-nexus-organizer.vercel.app";
const SESSION_KEY = "knoxcook:session";

// ---- session (optional — for attribution only) -------------------
function getSession() { try { return JSON.parse(localStorage.getItem(SESSION_KEY) || "null"); } catch { return null; } }
function setSession(s) { localStorage.setItem(SESSION_KEY, JSON.stringify(s)); }
function clearSession() { localStorage.removeItem(SESSION_KEY); }
async function pbkdf2(password, salt) {
  const enc = new TextEncoder();
  const key = await crypto.subtle.importKey("raw", enc.encode(password), { name: "PBKDF2" }, false, ["deriveBits"]);
  const bits = await crypto.subtle.deriveBits({ name: "PBKDF2", salt: enc.encode(salt), iterations: 100000, hash: "SHA-256" }, key, 256);
  return Array.from(new Uint8Array(bits)).map(b => b.toString(16).padStart(2, "0")).join("");
}
async function login(identifier, password) {
  // Use the shared Nexus login endpoint — server-side password verification.
  const r = await fetch(`${API}/api/auth/login`, {
    method: "POST",
    headers: { "content-type": "application/json" },
    body: JSON.stringify({ email: String(identifier).trim().toLowerCase(), password }),
  });
  const j = await r.json().catch(() => ({}));
  if (!r.ok || !j.ok) {
    const msg = j.error || "";
    if (/no account/i.test(msg)) throw new Error("No account with that email. Create one below.");
    if (/wrong password/i.test(msg)) throw new Error("Wrong password.");
    throw new Error(msg || `Sign-in failed (${r.status})`);
  }
  const profile = j.user?.profile || {};
  const id = j.user?.id || String(identifier).trim().toLowerCase();
  setSession({ id, name: profile.name || id.split("@")[0], email: profile.email || id, profile });
  return profile;
}
async function createAccount(identifier, password) {
  const id = String(identifier).trim().toLowerCase();
  if (password.length < 6) throw new Error("Password must be at least 6 chars");
  // Probe — if error is "wrong password" the account already exists
  const probeRes = await fetch(`${API}/api/auth/login`, {
    method: "POST",
    headers: { "content-type": "application/json" },
    body: JSON.stringify({ email: id, password: "__probe__" + Math.random() }),
  });
  const probeJson = await probeRes.json().catch(() => ({}));
  if (/wrong password/i.test(probeJson.error || "")) {
    throw new Error("That email already has an account. Try signing in instead.");
  }
  // No account — create it. Use crypto-random salt (hex) to match server encoding.
  const saltBytes = crypto.getRandomValues(new Uint8Array(16));
  const saltHex = Array.from(saltBytes).map(b => b.toString(16).padStart(2, "0")).join("");
  const passwordHash = await pbkdf2(password, saltHex);
  // Fetch any existing skeleton profile so we don't overwrite prior data
  let existing = null;
  try { const ex = await fetch(`${API}/api/users?id=${encodeURIComponent(id)}`); if (ex.ok) existing = (await ex.json()).profile; } catch {}
  const profile = {
    ...(existing || {}),
    email: id.includes("@") ? id : null,
    phone: !id.includes("@") ? id : null,
    name: existing?.name || id.split("@")[0] || id,
    passwordHash,
    passwordSalt: saltHex,
    createdAt: existing?.createdAt || new Date().toISOString(),
  };
  const r = await fetch(`${API}/api/users`, { method: "POST", headers: { "content-type": "application/json" }, body: JSON.stringify({ id, profile }) });
  if (!r.ok) throw new Error((await r.json().catch(() => ({}))).error || "Couldn't create account");
  return await login(identifier, password);
}

// ---- API helpers -------------------------------------------------
async function listRecipes(q) {
  const url = q ? `${API}/api/social?action=recipes&q=${encodeURIComponent(q)}` : `${API}/api/social?action=recipes`;
  const r = await fetch(url);
  const j = await r.json();
  if (!r.ok || j.ok === false) throw new Error(j.error || "Failed to load");
  return j.recipes || [];
}
async function getRecipe(id) {
  const r = await fetch(`${API}/api/social?action=recipe-get&id=${encodeURIComponent(id)}`);
  const j = await r.json();
  if (!r.ok || j.ok === false) throw new Error(j.error || "Not found");
  return j.recipe;
}
async function saveRecipe(recipe, mode = "save") {
  const author = getSession()?.name || "Anonymous";
  const r = await fetch(`${API}/api/social`, { method: "POST", headers: { "content-type": "application/json" }, body: JSON.stringify({ action: mode === "update" ? "recipe-update" : "recipe-save", recipe: { ...recipe, author: recipe.author || author } }) });
  const j = await r.json();
  if (!r.ok || j.ok === false) throw new Error(j.error || "Save failed");
  return j.recipe;
}
async function deleteRecipe(id) {
  const r = await fetch(`${API}/api/social`, { method: "POST", headers: { "content-type": "application/json" }, body: JSON.stringify({ action: "recipe-delete", id }) });
  const j = await r.json();
  if (!r.ok || j.ok === false) throw new Error(j.error || "Delete failed");
  return j;
}
async function genRecipe(prompt) {
  const r = await fetch(`${API}/api/ai/cook-generate`, { method: "POST", headers: { "content-type": "application/json" }, body: JSON.stringify({ input: prompt }) });
  const j = await r.json();
  if (!r.ok || j.ok === false) throw new Error(j.error || "AI failed");
  return j.recipe;
}
async function refineRecipe(recipe, refinement) {
  const r = await fetch(`${API}/api/ai/cook-refine`, { method: "POST", headers: { "content-type": "application/json" }, body: JSON.stringify({ recipe, refinement }) });
  const j = await r.json();
  if (!r.ok || j.ok === false) throw new Error(j.error || "AI failed");
  return j.recipe;
}
async function importUrl(url) {
  const r = await fetch(`${API}/api/ai/cook-import-url`, { method: "POST", headers: { "content-type": "application/json" }, body: JSON.stringify({ url }) });
  const j = await r.json();
  if (!r.ok || j.ok === false) throw new Error(j.error || "Import failed");
  return j.recipe;
}

// ---- utilities ---------------------------------------------------
function escapeHtml(s) { return String(s || "").replace(/[&<>"']/g, c => ({ "&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;" }[c])); }
function showToast(msg, ms = 3000, variant = "info") {
  let host = document.getElementById("toast");
  if (!host) { host = document.createElement("div"); host.id = "toast"; host.className = "toast"; document.body.appendChild(host); }
  const v = { info: { bg: "white", border: "var(--border)", color: "var(--text)" }, success: { bg: "#dcfce7", border: "#86efac", color: "#166534" }, error: { bg: "#fee2e2", border: "#fca5a5", color: "#991b1b" } }[variant] || {};
  host.style.background = v.bg; host.style.borderColor = v.border; host.style.color = v.color;
  host.textContent = msg; host.style.display = "block";
  clearTimeout(showToast._t); showToast._t = setTimeout(() => host.style.display = "none", ms);
}
function startProgress(host, kind) {
  const messages = kind === "refine" ? ["Reading your request…", "AI is adapting the recipe…", "Polishing the result…", "Almost done…"] : kind === "import" ? ["Fetching the page…", "Reading the recipe…", "Extracting ingredients…", "Writing it up…"] : ["Preheating the AI…", "Brainstorming ingredients…", "Building your recipe…", "Writing step-by-step instructions…", "Adding pro tips…", "Plating it nicely…"];
  host.innerHTML = `<div class="gen-progress"><div class="gen-progress-bar"><div class="gen-progress-fill" id="gpf"></div></div><div class="gen-progress-msg" id="gpm">${messages[0]}</div></div>`;
  let i = 0;
  const fill = host.querySelector("#gpf"), msg = host.querySelector("#gpm");
  const id = setInterval(() => { i = (i + 1) % messages.length; if (msg) msg.textContent = messages[i]; if (fill) { const pct = Math.min(92, parseFloat(fill.style.width || "5") + 10 + Math.random() * 12); fill.style.width = pct + "%"; } }, 1500);
  return { done: () => { clearInterval(id); host.innerHTML = ""; }, fail: () => { clearInterval(id); host.innerHTML = `<div style="color:var(--primary);font-size:12px;text-align:center">Failed</div>`; setTimeout(() => host.innerHTML = "", 2000); } };
}

// ---- Favorites & ratings & notes helpers -------------------------
function getFaves() { try { return JSON.parse(localStorage.getItem("knoxcook:faves") || "[]"); } catch { return []; } }
function toggleFave(id) {
  let f = getFaves();
  if (f.includes(id)) f = f.filter(x => x !== id);
  else f.unshift(id);
  localStorage.setItem("knoxcook:faves", JSON.stringify(f)); return f.includes(id);
}
function getRatings() { try { return JSON.parse(localStorage.getItem("knoxcook:ratings") || "{}"); } catch { return {}; } }
function setRating(id, stars) { const r = getRatings(); r[id] = stars; localStorage.setItem("knoxcook:ratings", JSON.stringify(r)); }
function getMyRating(id) { return getRatings()[id] || 0; }
function getNote(id) { try { return localStorage.getItem(`knoxcook:note:${id}`) || ""; } catch { return ""; } }
function setNote(id, text) { localStorage.setItem(`knoxcook:note:${id}`, text); }

// ---- Card thumbnail gradient from ID hash ------------------------
function idColor(id) {
  let h = 0; for (let i = 0; i < (id||"").length; i++) h = (h * 31 + (id||"").charCodeAt(i)) & 0xffffffff;
  const g = ["linear-gradient(135deg,#fde68a,#fca5a5)","linear-gradient(135deg,#a7f3d0,#6ee7b7)","linear-gradient(135deg,#bfdbfe,#a5f3fc)","linear-gradient(135deg,#ddd6fe,#f0abfc)","linear-gradient(135deg,#fed7aa,#fde68a)","linear-gradient(135deg,#fecaca,#fde68a)","linear-gradient(135deg,#c7d2fe,#a7f3d0)","linear-gradient(135deg,#fbcfe8,#fde68a)"];
  return g[Math.abs(h) % g.length];
}

// ---- Difficulty badge from ingredient count ----------------------
function diffBadge(recipe) {
  const d = recipe.difficulty || (recipe.ingredients?.length > 12 ? "Hard" : recipe.ingredients?.length > 6 ? "Medium" : "Easy");
  const cls = d.toLowerCase().includes("easy") ? "diff-easy" : d.toLowerCase().includes("hard") ? "diff-hard" : "diff-medium";
  return `<span class="diff-badge ${cls}">${escapeHtml(d)}</span>`;
}

// ---- Highlight search term in text -------------------------------
function highlight(text, q) {
  if (!q) return escapeHtml(text);
  const safe = q.replace(/[.*+?^${}()|[\]\\]/g, "\\$&");
  return escapeHtml(text).replace(new RegExp(`(${safe})`, "gi"), "<mark>$1</mark>");
}

// Full-screen cooking mode: one step at a time, huge text, parsed timers
function openCookingMode(recipe) {
  const overlay = document.createElement("div");
  overlay.style.cssText = "position:fixed;inset:0;background:#1f1109;color:white;z-index:9999;display:flex;flex-direction:column;padding:0;overflow:hidden";
  let stepIdx = 0;
  const steps = recipe.steps || [];
  let activeTimers = []; // [{ remainingMs, total, label, intervalId }]

  function parseTimers(stepText) {
    // Find patterns like "5 min", "10 minutes", "30 sec", "2 hours"
    const re = /(\d+(?:[-–]\d+)?)\s*(min|minute|minutes|sec|second|seconds|hr|hour|hours)\b/gi;
    const matches = [];
    let m;
    while ((m = re.exec(stepText)) !== null) {
      const rng = m[1].split(/[-–]/);
      const num = parseInt(rng[rng.length - 1]); // use the upper bound for safety
      let secs = 0;
      const u = m[2].toLowerCase();
      if (u.startsWith("sec")) secs = num;
      else if (u.startsWith("min")) secs = num * 60;
      else if (u.startsWith("hr") || u.startsWith("hour")) secs = num * 3600;
      matches.push({ label: m[0], secs });
    }
    return matches;
  }

  function fmt(s) { const h = Math.floor(s / 3600); const m = Math.floor((s % 3600) / 60); const sec = s % 60; return h ? `${h}:${String(m).padStart(2, "0")}:${String(sec).padStart(2, "0")}` : `${m}:${String(sec).padStart(2, "0")}`; }

  function startTimer(secs, label) {
    const t = { remainingMs: secs * 1000, total: secs, label, paused: false };
    t.intervalId = setInterval(() => {
      if (t.paused) return;
      t.remainingMs -= 1000;
      renderTimers();
      if (t.remainingMs <= 0) {
        clearInterval(t.intervalId);
        try { new Audio("data:audio/wav;base64,UklGRkQAAABXQVZFZm10IBAAAAABAAEARKwAAIhYAQACABAAZGF0YQAAAAAAAA==").play(); } catch {}
        if (navigator.vibrate) navigator.vibrate([300, 100, 300, 100, 300]);
        alert(`⏰ Timer done: ${label}`);
        activeTimers = activeTimers.filter(x => x !== t);
        renderTimers();
      }
    }, 1000);
    activeTimers.push(t);
    renderTimers();
  }

  function renderTimers() {
    const host = overlay.querySelector("#timers");
    if (!host) return;
    if (activeTimers.length === 0) { host.innerHTML = ""; return; }
    host.innerHTML = activeTimers.map((t, i) => `
      <div style="background:rgba(255,255,255,0.08);border-radius:12px;padding:10px 16px;display:flex;align-items:center;gap:10px">
        <span style="font-size:24px;font-weight:800;font-variant-numeric:tabular-nums;color:${t.remainingMs / 1000 < 30 ? "#fca5a5" : "#fbbf24"}">${fmt(Math.max(0, Math.ceil(t.remainingMs / 1000)))}</span>
        <span style="font-size:12px;opacity:0.7">${escapeHtml(t.label)}</span>
        <button class="cm-timer-pause" data-i="${i}" style="background:rgba(255,255,255,0.1);border:none;color:white;padding:4px 10px;border-radius:6px;cursor:pointer;font-size:11px">${t.paused ? "▶" : "⏸"}</button>
        <button class="cm-timer-stop" data-i="${i}" style="background:rgba(220,38,38,0.3);border:none;color:white;padding:4px 10px;border-radius:6px;cursor:pointer;font-size:11px">✕</button>
      </div>
    `).join("");
    host.querySelectorAll(".cm-timer-pause").forEach(b => b.addEventListener("click", () => { const i = Number(b.dataset.i); activeTimers[i].paused = !activeTimers[i].paused; renderTimers(); }));
    host.querySelectorAll(".cm-timer-stop").forEach(b => b.addEventListener("click", () => { const i = Number(b.dataset.i); clearInterval(activeTimers[i].intervalId); activeTimers.splice(i, 1); renderTimers(); }));
  }

  function renderStep() {
    const step = steps[stepIdx] || "Done!";
    const timers = parseTimers(step);
    overlay.innerHTML = `
      <div style="display:flex;justify-content:space-between;align-items:center;padding:14px 22px;border-bottom:1px solid rgba(255,255,255,0.1)">
        <div style="font-size:13px;opacity:0.7">${escapeHtml(recipe.title)}</div>
        <div style="font-size:13px;opacity:0.7">Step ${Math.min(stepIdx + 1, steps.length)} of ${steps.length}</div>
        <button id="cm-exit" style="background:transparent;border:none;color:white;font-size:20px;cursor:pointer">✕</button>
      </div>
      <div style="flex:1;display:flex;flex-direction:column;justify-content:center;align-items:center;padding:30px;text-align:center">
        <div style="font-size:64px;font-weight:800;color:#fbbf24;margin-bottom:24px">${stepIdx + 1}</div>
        <div style="font-size:28px;line-height:1.4;max-width:760px;font-weight:500">${escapeHtml(step)}</div>
        ${timers.length > 0 ? `<div style="display:flex;gap:8px;flex-wrap:wrap;justify-content:center;margin-top:26px">${timers.map(t => `<button class="cm-set-timer" data-secs="${t.secs}" data-label="${escapeHtml(t.label)}" style="background:linear-gradient(135deg,#fbbf24,#dc2626);border:none;color:white;padding:14px 24px;border-radius:14px;cursor:pointer;font-weight:700;font-size:15px">⏱ Start ${escapeHtml(t.label)}</button>`).join("")}</div>` : ""}
      </div>
      <div id="timers" style="padding:0 22px;display:flex;flex-direction:column;gap:8px"></div>
      <div style="display:flex;gap:12px;padding:22px;border-top:1px solid rgba(255,255,255,0.1)">
        <button id="cm-prev" ${stepIdx === 0 ? "disabled" : ""} style="flex:1;background:rgba(255,255,255,0.1);border:none;color:white;padding:18px;border-radius:12px;cursor:pointer;font-size:16px;font-weight:600;opacity:${stepIdx === 0 ? "0.4" : "1"}">← Back</button>
        <button id="cm-next" style="flex:2;background:linear-gradient(135deg,#fbbf24,#dc2626);border:none;color:white;padding:18px;border-radius:12px;cursor:pointer;font-size:18px;font-weight:800">${stepIdx >= steps.length - 1 ? "Done ✓" : "Next →"}</button>
      </div>
    `;
    overlay.querySelector("#cm-exit").addEventListener("click", closeOverlay);
    overlay.querySelector("#cm-prev").addEventListener("click", () => { if (stepIdx > 0) { stepIdx--; renderStep(); }});
    overlay.querySelector("#cm-next").addEventListener("click", () => { if (stepIdx >= steps.length - 1) { closeOverlay(); return; } stepIdx++; renderStep(); });
    overlay.querySelectorAll(".cm-set-timer").forEach(b => b.addEventListener("click", () => startTimer(Number(b.dataset.secs), b.dataset.label)));
    renderTimers();
  }

  function closeOverlay() {
    activeTimers.forEach(t => clearInterval(t.intervalId));
    overlay.remove();
    document.removeEventListener("keydown", keyHandler);
  }
  function keyHandler(e) {
    if (e.key === "Escape") closeOverlay();
    if (e.key === "ArrowRight" || e.key === " ") { e.preventDefault(); if (stepIdx < steps.length - 1) { stepIdx++; renderStep(); } else closeOverlay(); }
    if (e.key === "ArrowLeft") { if (stepIdx > 0) { stepIdx--; renderStep(); } }
  }
  document.addEventListener("keydown", keyHandler);
  document.body.appendChild(overlay);
  renderStep();
}

async function runFridge(e) {
  const file = e.target.files && e.target.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = async () => {
    const dataUrl = String(reader.result || "");
    const m = dataUrl.match(/^data:(image\/[a-z+]+);base64,(.+)$/);
    if (!m) return showToast("Couldn't read photo", 3000, "error");
    const extras = document.getElementById("fridge-extras")?.value || "";
    const progress = startProgress(document.getElementById("compose-progress"), "gen");
    const host = document.getElementById("fridge-result");
    host.innerHTML = "";
    try {
      const r = await fetch(`${API}/api/ai/cook-fridge`, {
        method: "POST", headers: { "content-type": "application/json" },
        body: JSON.stringify({ imageBase64: m[2], extras }),
      });
      const j = await r.json();
      progress.done();
      if (!r.ok || j.ok === false) throw new Error(j.error || "Analysis failed");
      host.innerHTML = `
        <div style="background:white;border:1px solid var(--border);border-radius:12px;padding:14px;margin-top:12px">
          <div style="font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:0.5px;color:var(--accent);margin-bottom:6px">What AI saw</div>
          <div style="font-size:13px;color:var(--muted);margin-bottom:10px">${escapeHtml(j.summary || "")}</div>
          <div style="display:flex;flex-wrap:wrap;gap:4px;margin-bottom:14px">${(j.ingredientsDetected || []).map(i => `<span class="card-tag" style="background:${i.confidence === 'high' ? '#dcfce7' : i.confidence === 'medium' ? '#fef3c7' : '#fee2e2'};color:${i.confidence === 'high' ? '#166534' : i.confidence === 'medium' ? '#92400e' : '#991b1b'};border-color:transparent">${escapeHtml(i.name)}${i.qtyEstimate ? ` <span style="opacity:0.7">(${escapeHtml(i.qtyEstimate)})</span>` : ""}</span>`).join("")}</div>
          <div style="font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:0.5px;color:var(--accent);margin-bottom:8px">Try cooking</div>
          <div style="display:grid;gap:8px">${(j.suggestions || []).map((s, i) => `
            <div style="background:var(--bg-2);border-radius:10px;padding:12px;display:flex;justify-content:space-between;align-items:center;gap:10px">
              <div style="flex:1;min-width:0">
                <div style="font-weight:700;font-size:14px;margin-bottom:3px">${escapeHtml(s.title)}</div>
                <div style="font-size:12px;color:var(--muted);line-height:1.45">${escapeHtml(s.rationale || "")}</div>
                <div style="font-size:11px;color:var(--muted);margin-top:4px">⏱ ${s.estimatedMinutes || "?"} min · ${escapeHtml(s.difficulty || "")}${s.missingMustBuy?.length ? ` · need: ${s.missingMustBuy.join(", ")}` : ""}</div>
              </div>
              <button class="btn btn-primary" data-fridge-make="${i}" style="flex-shrink:0">Cook it</button>
            </div>`).join("")}</div>
        </div>
      `;
      host.querySelectorAll("[data-fridge-make]").forEach(b => b.addEventListener("click", () => {
        const sug = j.suggestions[Number(b.dataset.fridgeMake)];
        document.getElementById("fridge-photo").value = "";
        composeMode = "ai";
        renderLibrary(document.getElementById("main"));
        setTimeout(() => {
          const p = document.getElementById("prompt");
          if (p) { p.value = `${sug.title} — uses: ${(sug.usesIngredients || []).join(", ")}`; runGenerate(); }
        }, 100);
      }));
    } catch (ex) {
      progress.fail();
      showToast(ex.message || "Failed", 5000, "error");
    }
  };
  reader.readAsDataURL(file);
}

async function runGenerate() {
  const prompt = document.getElementById("prompt").value.trim();
  if (!prompt) return showToast("Type a recipe idea first", 2500, "info");
  const btn = document.getElementById("go-btn");
  btn.disabled = true; btn.innerHTML = `<span class="spinner"></span> Cooking…`;
  const progress = startProgress(document.getElementById("compose-progress"), "gen");
  try {
    const recipe = await genRecipe(prompt);
    const saved = await saveRecipe(recipe);
    progress.done();
    showToast("Saved to public library", 2500, "success");
    document.getElementById("prompt").value = "";
    openRecipe(saved.id);
  } catch (e) {
    progress.fail(); showToast(e.message || "Failed", 5000, "error");
    btn.disabled = false; btn.textContent = "Generate";
  }
}
async function runImport() {
  const url = document.getElementById("prompt").value.trim();
  if (!url) return showToast("Paste a URL first", 2500, "info");
  const btn = document.getElementById("go-btn");
  btn.disabled = true; btn.innerHTML = `<span class="spinner"></span> Importing…`;
  const progress = startProgress(document.getElementById("compose-progress"), "import");

  } catch (e) {

    btn.disabled = false; btn.textContent = "Import";
  }
}

async function openRecipe(id) {
  view = "recipe";
  document.getElementById("main").innerHTML = `<div class="empty"><div class="spinner"></div></div>`;
  try {
    currentRecipe = await getRecipe(id);
    if (!currentRecipe) throw new Error("Not found");
    render();
  } catch (e) {
    showToast(e.message || "Failed", 4000, "error");
    view = "library"; render();
  }
}

      <div class="refine-shell">

        </div>

      </div>
    </div>
  `;
  document.getElementById("back").addEventListener("click", () => { view = "library"; render(); });

  document.getElementById("print-btn").addEventListener("click", () => window.print());
  document.getElementById("cook-mode-btn").addEventListener("click", () => openCookingMode(currentRecipe));

  // Ingredient checkboxes
  const ingChecked = {};
  function updateIngProgress() {
    const total = (r.ingredients||[]).length;
    const done = Object.values(ingChecked).filter(Boolean).length;
    const prog = document.getElementById("ing-progress");
    if (prog) prog.textContent = `${done} / ${total} checked`;
  }
  document.querySelectorAll("#ing-list [data-ing]").forEach(cb => {
    cb.addEventListener("change", () => {
      ingChecked[cb.dataset.ing] = cb.checked;
      const label = document.getElementById(`ing-${cb.dataset.ing}`);
      if (label) label.classList.toggle("checked", cb.checked);
      updateIngProgress();
    });
  });

  // Star ratings
  const starRow = document.getElementById("star-row");
  const starLabel = document.getElementById("star-label");
  if (starRow) {
    starRow.querySelectorAll(".star").forEach(s => {
      s.addEventListener("click", () => {
        const n = Number(s.dataset.star);
        setRating(r.id, n);
        starRow.querySelectorAll(".star").forEach((st, i) => st.textContent = i < n ? "⭐" : "☆");
        if (starLabel) starLabel.textContent = ["","★","★★","★★★","★★★★","★★★★★ Perfect!"][n];
        showToast(`Rated ${n} star${n>1?"s":""}`, 1800, "success");
      });
    });
  }

  // Favorite toggle on recipe page
  document.getElementById("fave-recipe-btn")?.addEventListener("click", () => {
    const isNow = toggleFave(r.id);
    document.getElementById("fave-recipe-btn").textContent = isNow ? "❤️ Favorited" : "🤍 Favorite";
    showToast(isNow ? "Added to favorites" : "Removed from favorites", 2000, isNow ? "success" : "info");
    render();
  });

  // Notes auto-save
  const noteArea = document.getElementById("recipe-note");
  const noteSaved = document.getElementById("note-saved");
  let noteSaveTimer;
  noteArea?.addEventListener("input", () => {
    clearTimeout(noteSaveTimer);
    noteSaveTimer = setTimeout(() => {
      setNote(r.id, noteArea.value);
      if (noteSaved) { noteSaved.style.opacity = "1"; setTimeout(() => noteSaved.style.opacity = "0", 1500); }
    }, 700);
  });

  // Copy recipe as text
  document.getElementById("copy-text-btn")?.addEventListener("click", async () => {
    const lines = [`${r.title}\n${"─".repeat(r.title.length)}`, r.description || "", "",
      `⏱ ${r.totalMinutes||"?"} min  🍽 ${r.servings||"?"} servings`, "",
      "INGREDIENTS", ...(r.ingredients||[]).map(i => `• ${i.qty||""} ${i.unit||""} ${i.name||""}${i.notes?" ("+i.notes+")":""}`.trim()),
      "", "STEPS", ...(r.steps||[]).map((s,i) => `${i+1}. ${s}`),
      ...(r.tips?.length ? ["", "TIPS", ...r.tips.map(t => `• ${t}`)] : [])];
    try { await navigator.clipboard.writeText(lines.join("\n")); showToast("Recipe copied as text!", 2500, "success"); }
    catch { showToast("Couldn't copy — try selecting and copying manually", 3000, "error"); }
  });

  // Read aloud
  let utterance = null;
  document.getElementById("read-aloud-btn")?.addEventListener("click", () => {
    if (window.speechSynthesis?.speaking) { window.speechSynthesis.cancel(); showToast("Stopped", 1500); return; }
    const text = `${r.title}. ${r.description||""}. Ingredients: ${(r.ingredients||[]).map(i=>`${i.qty||""} ${i.unit||""} ${i.name||""}`).join(", ")}. Steps: ${(r.steps||[]).join(". ")}`;
    utterance = new SpeechSynthesisUtterance(text);
    utterance.rate = 0.9;
    window.speechSynthesis.speak(utterance);
    showToast("Reading aloud — tap again to stop", 3000);
  });

  // Might also like — load suggestions
  const mltGrid = document.getElementById("might-like-grid");
  if (mltGrid) {
    listRecipes("").then(all => {
      const others = all.filter(x => x.id !== r.id).slice(0, 8);
      const recTags = new Set([...(r.tags||[]).map(t=>t.toLowerCase()), r.cuisine?.toLowerCase()].filter(Boolean));
      const scored = others.map(x => {
        const xTags = new Set([...(x.tags||[]).map(t=>t.toLowerCase()), x.cuisine?.toLowerCase()].filter(Boolean));
        const shared = [...recTags].filter(t => xTags.has(t)).length;
        return { ...x, _score: shared };
      }).sort((a,b) => b._score - a._score).slice(0, 4);
      if (scored.length === 0) { mltGrid.innerHTML = `<div style="font-size:13px;color:var(--muted)">Generate more recipes to see suggestions.</div>`; return; }
      mltGrid.innerHTML = scored.map(x => `
        <div class="might-like-card" data-rec-id="${escapeHtml(x.id)}">
          <div class="mlt">${escapeHtml(x.title)}</div>
          <div class="mlm">${x.totalMinutes ? `⏱ ${x.totalMinutes} min ·` : ""} ${escapeHtml(x.cuisine || (x.tags||[])[0] || "")}</div>
        </div>`).join("");
      mltGrid.querySelectorAll("[data-rec-id]").forEach(c => c.addEventListener("click", () => openRecipe(c.dataset.recId)));
    }).catch(() => { mltGrid.innerHTML = ""; });
  }
  document.getElementById("shop-add-btn").addEventListener("click", () => {
    if (shoppingCart.includes(r.id)) { shoppingCart = shoppingCart.filter(x => x !== r.id); showToast("Removed from shopping list", 2000, "info"); }
    else { shoppingCart.push(r.id); showToast("Added to shopping list", 2000, "success"); }
    localStorage.setItem("knoxcook:cart", JSON.stringify(shoppingCart));
    render();
  });
  document.getElementById("cooked-btn").addEventListener("click", async () => {
    try {
      const res = await fetch(`${API}/api/social`, { method: "POST", headers: { "content-type": "application/json" }, body: JSON.stringify({ action: "recipe-cook", id: r.id }) });
      const j = await res.json();
      if (j.ok) { showToast(`Logged! You've cooked this ${j.timesMade} time${j.timesMade === 1 ? "" : "s"}.`, 3000, "success"); currentRecipe.timesMade = j.timesMade; render(); }
    } catch { showToast("Couldn't log it", 3000, "error"); }
  });
  // Scaling slider — live, no AI
  let scaleFactor = 1;
  function applyScale(f) {
    scaleFactor = Math.max(0.25, Math.min(8, f));
    document.getElementById("scale-val").textContent = scaleFactor + "×";
    document.querySelectorAll(".ing-qty").forEach((qtyEl, i) => {
      const orig = currentRecipe.ingredients[i];
      if (!orig) return;
      const num = parseFloat(String(orig.qty || "").replace(",", "."));
      if (isFinite(num)) {
        const scaled = num * scaleFactor;
        const rounded = scaled < 1 ? scaled.toFixed(2).replace(/\.?0+$/, "") : scaled < 10 ? scaled.toFixed(1).replace(/\.0$/, "") : Math.round(scaled).toString();
        qtyEl.textContent = `${rounded}${orig.unit ? " " + orig.unit : ""}`;
      }
    });
    let warnHost = document.getElementById("scale-warn");
    if (scaleFactor !== 1) {
      if (!warnHost) {
        warnHost = document.createElement("div");
        warnHost.id = "scale-warn";
        warnHost.style.cssText = "padding:8px 14px;margin:8px 0;background:#fef3c7;border-radius:8px;font-size:11px;color:#92400e";
        document.querySelector(".recipe-actions").after(warnHost);
      }
      warnHost.innerHTML = `📏 Scaled ${scaleFactor}× — don't blindly scale salt, baking soda, yeast, or spices linearly. ${currentRecipe.scalingNotes ? `<br><strong>Author note:</strong> ${escapeHtml(currentRecipe.scalingNotes)}` : ""}`;
    } else if (warnHost) { warnHost.remove(); }
  }
  document.getElementById("scale-dn").addEventListener("click", () => applyScale(scaleFactor <= 1 ? scaleFactor / 2 : scaleFactor - 1));
  document.getElementById("scale-up").addEventListener("click", () => applyScale(scaleFactor < 1 ? scaleFactor * 2 : scaleFactor + 1));
  // Variation generators
  document.querySelectorAll("[data-vary]").forEach(b => b.addEventListener("click", async () => {
    const vary = b.dataset.vary;
    const wishMap = { vegan: "Make this fully vegan", spicier: "Make it noticeably spicier", quick: "Cut total time to 30 minutes or less", "gluten-free": "Make it gluten-free", kids: "Adapt for kid-friendly taste (mild, less spice, familiar flavors)", healthy: "Make a noticeably healthier version (lower fat or sugar, more veg, lighter)" };
    const wish = wishMap[vary] || vary;
    b.disabled = true; const orig = b.textContent; b.innerHTML = `<span class="spinner"></span>`;
    try {
      const refined = await refineRecipe(currentRecipe, wish);
      refined.title = (refined.title || currentRecipe.title) + " — " + vary.charAt(0).toUpperCase() + vary.slice(1);
      const saved = await saveRecipe(refined);
      showToast(`Variation saved as new recipe`, 2500, "success");
      openRecipe(saved.id);
    } catch (e) {
      showToast(e.message || "Failed", 4000, "error");
      b.disabled = false; b.textContent = orig;
    }
  }));
  document.getElementById("share-btn").addEventListener("click", async () => {
    const url = location.href.split("?")[0] + "?r=" + encodeURIComponent(r.id);
    try { await navigator.clipboard.writeText(url); showToast("Link copied to clipboard", 2500, "success"); }
    catch { showToast(url, 5000); }
  });
  document.getElementById("del-btn").addEventListener("click", async () => {
    if (!confirm(`Delete "${r.title}" permanently? It's public — anyone could have saved it.`)) return;
    try { await deleteRecipe(r.id); showToast("Deleted", 2000, "success"); view = "library"; render(); }
    catch (e) { showToast(e.message || "Failed", 4000, "error"); }
  });
  document.querySelectorAll("[data-suggest]").forEach(b => b.addEventListener("click", () => { document.getElementById("refine-input").value = b.dataset.suggest; document.getElementById("refine-input").focus(); }));
  const rbtn = document.getElementById("refine-btn");
  async function doRefine() {
    const inp = document.getElementById("refine-input");
    const text = inp.value.trim();
    if (!text) return;
    rbtn.disabled = true; rbtn.innerHTML = `<span class="spinner"></span>`;
    const progress = startProgress(document.getElementById("refine-progress"), "refine");
    try {
      const refined = await refineRecipe(currentRecipe, text);
      refined.id = currentRecipe.id;
      const saved = await saveRecipe(refined, "update");
      currentRecipe = saved;
      progress.done(); inp.value = ""; render();
      showToast("Recipe updated", 2500, "success");
    } catch (e) {
      progress.fail(); showToast(e.message || "Failed", 4000, "error");
      rbtn.disabled = false; rbtn.textContent = "Apply";
    }
  }
  rbtn.addEventListener("click", doRefine);
  document.getElementById("refine-input").addEventListener("keydown", e => { if (e.key === "Enter") doRefine(); });
}

      </div></div>
    `;
    document.getElementById("to-create")?.addEventListener("click", () => { mode = "create"; paint(); });

function openPalette() {
  if (document.getElementById("cmd-palette")) return;
  const recs = JSON.parse(localStorage.getItem("knoxcook:cache-last") || "[]");
  const overlay = document.createElement("div");
  overlay.id = "cmd-palette";
  overlay.style.cssText = "position:fixed;inset:0;background:rgba(0,0,0,0.5);backdrop-filter:blur(6px);z-index:9999;display:flex;justify-content:center;align-items:flex-start;padding-top:80px";
  overlay.innerHTML = `<div style="background:white;border-radius:14px;width:100%;max-width:520px;overflow:hidden;box-shadow:0 30px 80px rgba(0,0,0,0.3)">
    <input id="cmd-input" type="text" autofocus placeholder="Type to search recipes, actions, or jump to apps…" style="width:100%;padding:18px 22px;font-size:15px;border:none;outline:none;font-family:inherit;border-bottom:1px solid var(--border)" />
    <div id="cmd-results" style="max-height:400px;overflow-y:auto"></div>
  </div>`;
  document.body.appendChild(overlay);
  const actions = [
    { label: "🍳 Generate new recipe", action: () => { view = "library"; composeMode = "ai"; render(); } },
    { label: "❤️ My favorites", action: () => { view = "library"; libraryFilter = "faves"; render(); } },
    { label: "📷 Cook from my fridge", action: () => { view = "library"; composeMode = "fridge"; render(); } },
    { label: "🎲 Random recipe", action: openRandomRecipe },
    { label: "🛒 Open shopping list", action: () => { view = "shopping"; render(); } },
    { label: "🌐 Open Knox Apps Hub", action: () => window.location.href = "https://knox-apps-hub.vercel.app" },
    { label: "🛠 Open Forge (3D)", action: () => window.location.href = "https://knox-forge-knox-grover-s-projects.vercel.app" },
    { label: "✨ Open Sites", action: () => window.location.href = "https://knox-sites.vercel.app" },
    { label: "💪 Open Nexus (fitness)", action: () => window.location.href = "https://life-nexus-organizer.vercel.app" },
  ];
  function renderPalette(q = "") {
    const filteredActions = actions.filter(a => !q || a.label.toLowerCase().includes(q.toLowerCase()));
    const filteredRecs = q ? recs.filter((r) => (r.title + r.description).toLowerCase().includes(q.toLowerCase())).slice(0, 5) : [];
    const html = [
      ...filteredActions.map((a, i) => `<button class="cmd-row" data-act="${i}" style="display:block;width:100%;text-align:left;padding:12px 22px;background:none;border:none;font-family:inherit;font-size:14px;cursor:pointer;color:#1f1109">${a.label}</button>`),
      ...filteredRecs.map(r => `<button class="cmd-row" data-rec="${escapeHtml(r.id)}" style="display:block;width:100%;text-align:left;padding:10px 22px;background:#fffaf2;border:none;font-family:inherit;font-size:13px;cursor:pointer;color:#1f1109">🍴 ${escapeHtml(r.title)}</button>`),
    ].join("");
    document.getElementById("cmd-results").innerHTML = html || `<div style="padding:18px;color:var(--muted);text-align:center;font-size:13px">No matches</div>`;
    document.querySelectorAll(".cmd-row").forEach(b => b.addEventListener("click", () => {
      if (b.dataset.act !== undefined) { close(); filteredActions[Number(b.dataset.act)].action(); }
      else if (b.dataset.rec) { close(); openRecipe(b.dataset.rec); }
    }));
  }
  function close() { overlay.remove(); document.removeEventListener("keydown", esc); }
  function esc(e) { if (e.key === "Escape") close(); }
  document.addEventListener("keydown", esc);
  overlay.addEventListener("click", (e) => { if (e.target === overlay) close(); });
  document.getElementById("cmd-input").addEventListener("input", e => renderPalette(e.target.value));
  renderPalette();
}
// Cache last-loaded recipes for palette search
const _origList = listRecipes;
window.listRecipes = async function(q) { const r = await _origList(q); try { localStorage.setItem("knoxcook:cache-last", JSON.stringify(r.slice(0, 50))); } catch {} return r; };

// deep link ?r=recipe-id
const params = new URLSearchParams(location.search);
if (params.get("r")) {
  openRecipe(params.get("r"));
} else {
  render();
}
</script>
</body>
</html>
