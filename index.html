<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
<meta name="theme-color" content="#fff8f0" />
<title>Cook — public AI recipe library</title>
<link rel="manifest" href="/manifest.json" />
<link rel="icon" type="image/svg+xml" href="/icon.svg" />
<style>
  :root {
    --bg: #fff8f0;
    --bg-2: #fffaf2;
    --card: #ffffff;
    --text: #1f1109;
    --muted: #78716c;
    --muted-2: #a8a29e;
    --border: #f3e8d9;
    --border-soft: #f9f0e1;
    --primary: #dc2626;
    --primary-2: #fbbf24;
    --accent: #b45309;
  }
  *, *::before, *::after { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; min-height: 100vh; background: var(--bg); color: var(--text); font-family: "Inter", ui-sans-serif, system-ui, -apple-system, sans-serif; font-size: 14px; line-height: 1.5; -webkit-font-smoothing: antialiased; }
  button { font-family: inherit; }
  a { color: var(--accent); }
  .top { background: white; border-bottom: 1px solid var(--border); position: sticky; top: 0; z-index: 30; }
  .top-inner { max-width: 1080px; margin: 0 auto; padding: 14px 20px; display: flex; align-items: center; gap: 16px; }
  .brand { display: flex; align-items: center; gap: 10px; flex-shrink: 0; cursor: pointer; }
  .brand-mark { width: 38px; height: 38px; border-radius: 10px; background: linear-gradient(135deg, var(--primary-2), var(--primary)); display: grid; place-items: center; }
  .brand-mark svg { width: 20px; height: 20px; }
  .brand-text { font-size: 19px; font-weight: 800; letter-spacing: -0.6px; color: var(--text); }
  .brand-text small { display: block; font-size: 11px; color: var(--muted); font-weight: 500; letter-spacing: 0; margin-top: 1px; }
  .search-input { flex: 1; max-width: 520px; padding: 10px 16px 10px 40px; border-radius: 999px; border: 1px solid var(--border); background: var(--bg); color: var(--text); font-size: 14px; font-family: inherit;
    background-image: url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='none' stroke='%23a8a29e' stroke-width='2' stroke-linecap='round' stroke-linejoin='round'><circle cx='11' cy='11' r='8'/><line x1='21' y1='21' x2='16.65' y2='16.65'/></svg>");
    background-repeat: no-repeat; background-position: 12px center; background-size: 18px; }
  .search-input:focus { outline: none; border-color: var(--primary); }
  .top-btns { display: flex; gap: 8px; align-items: center; }
  .btn { padding: 9px 16px; border-radius: 10px; border: none; cursor: pointer; font-weight: 600; font-size: 13px; font-family: inherit; display: inline-flex; align-items: center; justify-content: center; gap: 6px; transition: all 0.12s; }
  .btn-primary { background: linear-gradient(135deg, var(--primary), var(--primary-2)); color: white; }
  .btn-primary:hover { transform: translateY(-1px); box-shadow: 0 6px 18px rgba(220,38,38,0.3); }
  .btn-secondary { background: white; border: 1px solid var(--border); color: var(--text); }
  .btn-secondary:hover { border-color: var(--primary); }
  .btn-ghost { background: transparent; border: none; color: var(--muted); padding: 8px 10px; cursor: pointer; font-size: 13px; }
  .btn-ghost:hover { color: var(--text); }
  .btn:disabled { opacity: 0.55; cursor: not-allowed; transform: none; box-shadow: none; }
  .spinner { display: inline-block; width: 12px; height: 12px; border: 2px solid currentColor; border-right-color: transparent; border-radius: 50%; animation: spin 0.7s linear infinite; }
  @keyframes spin { to { transform: rotate(360deg); } }
  .main { max-width: 1080px; margin: 0 auto; padding: 24px 20px 80px; }
  .page-title { font-size: 28px; font-weight: 800; margin-bottom: 4px; letter-spacing: -0.8px; }
  .page-sub { color: var(--muted); margin-bottom: 18px; font-size: 14px; }
  /* Generate / Import bar */
  .compose { background: white; border: 1px solid var(--border); border-radius: 16px; padding: 16px; margin-bottom: 22px; }
  .compose-row { display: flex; gap: 8px; align-items: stretch; }
  .compose-row input[type="text"] { flex: 1; padding: 10px 14px; border-radius: 10px; border: 1px solid var(--border); background: var(--bg); color: var(--text); font-size: 14px; font-family: inherit; }
  .compose-row input:focus { outline: none; border-color: var(--primary); }
  .compose-row .btn { flex-shrink: 0; }
  .compose-tabs { display: flex; gap: 4px; margin-bottom: 10px; }
  .compose-tab { background: transparent; border: none; padding: 6px 12px; border-radius: 8px; font-size: 13px; color: var(--muted); cursor: pointer; font-family: inherit; font-weight: 600; }
  .compose-tab.active { background: rgba(220,38,38,0.1); color: var(--primary); }
  .examples { display: flex; flex-wrap: wrap; gap: 6px; margin-top: 10px; }
  .ex-chip { background: var(--bg); border: 1px solid var(--border); border-radius: 999px; padding: 5px 12px; font-size: 12px; color: var(--muted); cursor: pointer; font-family: inherit; }
  .ex-chip:hover { color: var(--text); border-color: var(--primary); }
  /* Recipe grid */
  .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 14px; }
  .card { background: white; border: 1px solid var(--border); border-radius: 14px; overflow: hidden; cursor: pointer; transition: all 0.15s; display: flex; flex-direction: column; }
  .card:hover { border-color: var(--primary); transform: translateY(-2px); box-shadow: 0 10px 24px rgba(220,38,38,0.1); }
  .card-cover { aspect-ratio: 16/10; background: linear-gradient(135deg, #fde68a, #fca5a5); display: grid; place-items: center; color: white; font-size: 38px; font-weight: 800; }
  .card-body { padding: 14px; }
  .card-title { font-size: 15px; font-weight: 700; margin-bottom: 4px; letter-spacing: -0.2px; }
  .card-desc { font-size: 12px; color: var(--muted); line-height: 1.45; min-height: 36px; }
  .card-meta { display: flex; gap: 10px; margin-top: 10px; font-size: 11px; color: var(--muted); flex-wrap: wrap; }
  .card-tag { background: var(--bg); border: 1px solid var(--border); border-radius: 999px; padding: 1px 8px; font-size: 10px; color: var(--accent); font-weight: 600; }
  .empty { text-align: center; padding: 60px 20px; color: var(--muted); }
  .empty-icon { font-size: 48px; margin-bottom: 14px; }
  .empty h2 { color: var(--text); margin-bottom: 8px; font-size: 18px; }
  /* Recipe view */
  .recipe-page { background: white; border: 1px solid var(--border); border-radius: 18px; padding: 0; overflow: hidden; }
  .recipe-hero { padding: 28px 32px 22px; background: linear-gradient(135deg, #fef3c7 0%, #fde68a 100%); }
  .recipe-title { font-size: 32px; font-weight: 800; letter-spacing: -1px; margin-bottom: 6px; }
  .recipe-desc { font-size: 14px; color: var(--muted); margin-bottom: 14px; max-width: 700px; }
  .recipe-stats { display: flex; gap: 16px; flex-wrap: wrap; font-size: 12px; }
  .stat { background: white; padding: 6px 12px; border-radius: 999px; border: 1px solid var(--border); }
  .stat strong { font-size: 13px; }
  .recipe-tags { margin-top: 14px; display: flex; gap: 4px; flex-wrap: wrap; }
  .recipe-tags .card-tag { font-size: 11px; padding: 3px 10px; }
  .recipe-body { padding: 28px 32px; display: grid; grid-template-columns: 280px 1fr; gap: 36px; }
  @media (max-width: 720px) { .recipe-body { grid-template-columns: 1fr; gap: 20px; } .recipe-hero { padding: 20px; } .recipe-body { padding: 20px; } .recipe-title { font-size: 24px; } }
  .section-title { font-size: 13px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.5px; color: var(--accent); margin-bottom: 10px; }
  .ingredients li, .equipment li, .tips li { padding: 6px 0; border-bottom: 1px solid var(--border-soft); font-size: 14px; }
  .ingredients li:last-child, .equipment li:last-child, .tips li:last-child { border-bottom: none; }
  .ing-qty { font-weight: 700; color: var(--accent); margin-right: 6px; }
  .ing-notes { font-size: 12px; color: var(--muted); margin-left: 4px; }
  ol.steps { padding-left: 0; list-style: none; counter-reset: step; }
  ol.steps li { padding: 14px 18px 14px 50px; margin-bottom: 8px; background: var(--bg-2); border-radius: 12px; counter-increment: step; position: relative; line-height: 1.6; font-size: 14px; }
  ol.steps li::before { content: counter(step); position: absolute; left: 14px; top: 14px; width: 26px; height: 26px; background: linear-gradient(135deg, var(--primary), var(--primary-2)); color: white; border-radius: 50%; display: grid; place-items: center; font-weight: 800; font-size: 13px; }
  .recipe-actions { display: flex; gap: 8px; padding: 18px 32px; border-top: 1px solid var(--border); background: var(--bg-2); flex-wrap: wrap; }
  /* Refine chat */
  .refine-shell { padding: 18px 32px; border-top: 1px solid var(--border); }
  .refine-input-row { display: flex; gap: 8px; margin-top: 8px; }
  .refine-input-row input { flex: 1; padding: 10px 14px; border-radius: 10px; border: 1px solid var(--border); background: var(--bg); font-size: 13px; font-family: inherit; }
  .refine-input-row input:focus { outline: none; border-color: var(--primary); }
  .refine-suggestions { display: flex; flex-wrap: wrap; gap: 6px; margin-top: 8px; }
  .refine-suggestions .ex-chip { font-size: 11px; }
  /* Editor */
  .edit-shell { padding: 18px 32px; border-top: 1px solid var(--border); }
  .edit-row { display: flex; gap: 8px; margin-bottom: 10px; align-items: center; }
  .edit-row label { font-size: 11px; color: var(--muted); width: 80px; flex-shrink: 0; }
  .edit-row input, .edit-row textarea { flex: 1; padding: 8px 12px; border-radius: 8px; border: 1px solid var(--border); background: var(--bg); font-size: 13px; font-family: inherit; }
  textarea { resize: vertical; }
  .gen-progress { margin-top: 10px; }
  .gen-progress-bar { height: 3px; background: var(--bg); border-radius: 999px; overflow: hidden; }
  .gen-progress-fill { height: 100%; background: linear-gradient(90deg, var(--primary), var(--primary-2)); width: 5%; transition: width 0.6s ease; border-radius: 999px; }
  .gen-progress-msg { font-size: 12px; color: var(--muted); margin-top: 5px; text-align: center; }
  .toast { position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%); padding: 12px 18px; border-radius: 12px; font-size: 13px; z-index: 9999; box-shadow: 0 10px 30px rgba(0,0,0,0.18); max-width: 520px; text-align: center; display: none; border: 1px solid; }
</style>
</head>
<body>

<div class="top">
  <div class="top-inner">
    <div class="brand" id="brand">
      <div class="brand-mark">
        <svg viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round">
          <path d="M7 11h10l-1 8a1 1 0 0 1-1 1H9a1 1 0 0 1-1-1l-1-8z"/>
          <path d="M7 11a2 2 0 0 1-2-2V6"/>
          <path d="M17 11a2 2 0 0 0 2-2V6"/>
        </svg>
      </div>
      <div class="brand-text">Cook<small>public AI recipes</small></div>
    </div>
    <input type="text" class="search-input" id="search" placeholder="Search recipes..." />
    <div class="top-btns">
      <button class="btn btn-secondary" id="account-btn">Sign in</button>
    </div>
  </div>
</div>

<div class="main" id="main"></div>

<script type="module">
const API = "https://life-nexus-organizer.vercel.app";
const SESSION_KEY = "knoxcook:session";

// ---- session (optional — for attribution only) -------------------
function getSession() { try { return JSON.parse(localStorage.getItem(SESSION_KEY) || "null"); } catch { return null; } }
function setSession(s) { localStorage.setItem(SESSION_KEY, JSON.stringify(s)); }
function clearSession() { localStorage.removeItem(SESSION_KEY); }
async function pbkdf2(password, salt) {
  const enc = new TextEncoder();
  const key = await crypto.subtle.importKey("raw", enc.encode(password), { name: "PBKDF2" }, false, ["deriveBits"]);
  const bits = await crypto.subtle.deriveBits({ name: "PBKDF2", salt: enc.encode(salt), iterations: 100000, hash: "SHA-256" }, key, 256);
  return Array.from(new Uint8Array(bits)).map(b => b.toString(16).padStart(2, "0")).join("");
}
async function login(identifier, password) {
  const id = String(identifier).trim().toLowerCase();
  const r = await fetch(`${API}/api/users?id=${encodeURIComponent(id)}`);
  if (!r.ok) throw new Error("User not found");
  const j = await r.json();
  const profile = j.profile;
  if (!profile?.passwordHash) throw new Error("This account hasn't set a password");
  const hash = await pbkdf2(password, profile.passwordSalt || "");
  if (hash !== profile.passwordHash) throw new Error("Wrong password");
  setSession({ id, name: profile.name || id.split("@")[0], email: profile.email });
  return profile;
}
async function createAccount(identifier, password) {
  const id = String(identifier).trim().toLowerCase();
  if (password.length < 6) throw new Error("Password must be at least 6 chars");
  const check = await fetch(`${API}/api/users?id=${encodeURIComponent(id)}`);
  let existing = null;
  if (check.ok) { try { existing = (await check.json()).profile; } catch {} }
  const salt = Math.random().toString(36).slice(2, 18);
  const passwordHash = await pbkdf2(password, salt);
  const profile = existing && existing.passwordHash
    ? null
    : { ...(existing || {}), email: id.includes("@") ? id : null, phone: !id.includes("@") ? id : null, name: existing?.name || id.split("@")[0] || id, passwordHash, passwordSalt: salt, createdAt: existing?.createdAt || new Date().toISOString() };
  if (!profile) throw new Error("This account already exists. Try signing in.");
  const r = await fetch(`${API}/api/users`, { method: "POST", headers: { "content-type": "application/json" }, body: JSON.stringify({ id, profile }) });
  if (!r.ok) throw new Error((await r.json().catch(() => ({}))).error || "Couldn't create account");
  return await login(identifier, password);
}

// ---- API helpers -------------------------------------------------
async function listRecipes(q) {
  const url = q ? `${API}/api/social?action=recipes&q=${encodeURIComponent(q)}` : `${API}/api/social?action=recipes`;
  const r = await fetch(url);
  const j = await r.json();
  if (!r.ok || j.ok === false) throw new Error(j.error || "Failed to load");
  return j.recipes || [];
}
async function getRecipe(id) {
  const r = await fetch(`${API}/api/social?action=recipe-get&id=${encodeURIComponent(id)}`);
  const j = await r.json();
  if (!r.ok || j.ok === false) throw new Error(j.error || "Not found");
  return j.recipe;
}
async function saveRecipe(recipe, mode = "save") {
  const author = getSession()?.name || "Anonymous";
  const r = await fetch(`${API}/api/social`, { method: "POST", headers: { "content-type": "application/json" }, body: JSON.stringify({ action: mode === "update" ? "recipe-update" : "recipe-save", recipe: { ...recipe, author: recipe.author || author } }) });
  const j = await r.json();
  if (!r.ok || j.ok === false) throw new Error(j.error || "Save failed");
  return j.recipe;
}
async function deleteRecipe(id) {
  const r = await fetch(`${API}/api/social`, { method: "POST", headers: { "content-type": "application/json" }, body: JSON.stringify({ action: "recipe-delete", id }) });
  const j = await r.json();
  if (!r.ok || j.ok === false) throw new Error(j.error || "Delete failed");
  return j;
}
async function genRecipe(prompt) {
  const r = await fetch(`${API}/api/ai/cook-generate`, { method: "POST", headers: { "content-type": "application/json" }, body: JSON.stringify({ input: prompt }) });
  const j = await r.json();
  if (!r.ok || j.ok === false) throw new Error(j.error || "AI failed");
  return j.recipe;
}
async function refineRecipe(recipe, refinement) {
  const r = await fetch(`${API}/api/ai/cook-refine`, { method: "POST", headers: { "content-type": "application/json" }, body: JSON.stringify({ recipe, refinement }) });
  const j = await r.json();
  if (!r.ok || j.ok === false) throw new Error(j.error || "AI failed");
  return j.recipe;
}
async function importUrl(url) {
  const r = await fetch(`${API}/api/ai/cook-import-url`, { method: "POST", headers: { "content-type": "application/json" }, body: JSON.stringify({ url }) });
  const j = await r.json();
  if (!r.ok || j.ok === false) throw new Error(j.error || "Import failed");
  return j.recipe;
}

// ---- utilities ---------------------------------------------------
function escapeHtml(s) { return String(s || "").replace(/[&<>"']/g, c => ({ "&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;" }[c])); }
function showToast(msg, ms = 3000, variant = "info") {
  let host = document.getElementById("toast");
  if (!host) { host = document.createElement("div"); host.id = "toast"; host.className = "toast"; document.body.appendChild(host); }
  const v = { info: { bg: "white", border: "var(--border)", color: "var(--text)" }, success: { bg: "#dcfce7", border: "#86efac", color: "#166534" }, error: { bg: "#fee2e2", border: "#fca5a5", color: "#991b1b" } }[variant] || {};
  host.style.background = v.bg; host.style.borderColor = v.border; host.style.color = v.color;
  host.textContent = msg; host.style.display = "block";
  clearTimeout(showToast._t); showToast._t = setTimeout(() => host.style.display = "none", ms);
}
function startProgress(host, kind) {
  const messages = kind === "refine" ? ["Reading your change…", "AI is updating…", "Polishing…"] : kind === "import" ? ["Fetching the page…", "Extracting recipe…", "Cleaning up…"] : ["Reading your idea…", "AI is cooking up the recipe…", "Picking quantities…", "Writing steps…", "Adding tips…"];
  host.innerHTML = `<div class="gen-progress"><div class="gen-progress-bar"><div class="gen-progress-fill" id="gpf"></div></div><div class="gen-progress-msg" id="gpm">${messages[0]}</div></div>`;
  let i = 0;
  const fill = host.querySelector("#gpf"), msg = host.querySelector("#gpm");
  const id = setInterval(() => { i = (i + 1) % messages.length; if (msg) msg.textContent = messages[i]; if (fill) { const pct = Math.min(92, parseFloat(fill.style.width || "5") + 10 + Math.random() * 12); fill.style.width = pct + "%"; } }, 1500);
  return { done: () => { clearInterval(id); host.innerHTML = ""; }, fail: () => { clearInterval(id); host.innerHTML = `<div style="color:var(--primary);font-size:12px;text-align:center">Failed</div>`; setTimeout(() => host.innerHTML = "", 2000); } };
}

// ---- state + routes ----------------------------------------------
let view = "library";  // library | recipe | edit | new | auth
let currentRecipe = null;
let composeMode = "ai";   // ai | url
let searchQuery = "";
const EXAMPLES = ["Tonkotsu ramen with chashu", "30-minute weeknight tacos al pastor", "Pumpkin spice latte from scratch", "Sourdough discard pancakes", "Vegan chocolate chip cookies", "Thai basil chicken (pad krapow)", "Crispy oven-fried buffalo cauliflower", "Classic French onion soup"];

function render() {
  const el = document.getElementById("main");
  const accBtn = document.getElementById("account-btn");
  const s = getSession();
  accBtn.textContent = s ? s.name : "Sign in";
  accBtn.onclick = () => s ? (clearSession(), showToast("Signed out", 2000), render()) : (view = "auth", render());

  if (view === "auth") return renderAuth(el);
  if (view === "recipe") return renderRecipe(el);
  if (view === "edit") return renderEdit(el);
  return renderLibrary(el);
}

function renderLibrary(el) {
  el.innerHTML = `
    <div class="page-title">All recipes</div>
    <div class="page-sub">Public library — anyone can browse, anyone can add. Type a request, AI generates + saves it for everyone.</div>
    <div class="compose">
      <div class="compose-tabs">
        <button class="compose-tab ${composeMode === "ai" ? "active" : ""}" data-tab="ai">✨ AI generate</button>
        <button class="compose-tab ${composeMode === "url" ? "active" : ""}" data-tab="url">🔗 Import from URL</button>
      </div>
      <div class="compose-row">
        <input type="text" id="prompt" placeholder="${composeMode === "ai" ? "e.g. 'classic chocolate chip cookies' or 'one-pot creamy chicken pasta'" : "https://allrecipes.com/recipe/..."}" />
        <button class="btn btn-primary" id="go-btn">${composeMode === "ai" ? "Generate" : "Import"}</button>
      </div>
      <div id="compose-progress"></div>
      ${composeMode === "ai" ? `<div class="examples">${EXAMPLES.map(e => `<button class="ex-chip" data-ex="${escapeHtml(e)}">${escapeHtml(e)}</button>`).join("")}</div>` : `<div class="examples" style="font-size:11px;color:var(--muted);margin-top:8px">Paste a URL from any recipe blog. AI extracts the title, ingredients, steps, and saves it to the public library.</div>`}
    </div>
    <div id="recipe-grid"></div>
  `;
  el.querySelectorAll(".compose-tab[data-tab]").forEach(b => b.addEventListener("click", () => { composeMode = b.dataset.tab; renderLibrary(el); }));
  el.querySelectorAll("[data-ex]").forEach(b => b.addEventListener("click", () => { document.getElementById("prompt").value = b.dataset.ex; document.getElementById("prompt").focus(); }));
  document.getElementById("go-btn").addEventListener("click", composeMode === "ai" ? runGenerate : runImport);
  document.getElementById("prompt").addEventListener("keydown", e => { if (e.key === "Enter") (composeMode === "ai" ? runGenerate : runImport)(); });

  const gridHost = document.getElementById("recipe-grid");
  gridHost.innerHTML = `<div class="empty"><div class="spinner"></div><br>Loading recipes…</div>`;
  listRecipes(searchQuery).then(recs => {
    if (recs.length === 0) {
      gridHost.innerHTML = `<div class="empty"><div class="empty-icon">🍳</div><h2>${searchQuery ? `No results for "${escapeHtml(searchQuery)}"` : "No recipes yet"}</h2><p>${searchQuery ? "Try a different search or generate one." : "Be the first — type what you want and hit Generate."}</p></div>`;
      return;
    }
    gridHost.innerHTML = `<div class="grid">${recs.map(r => `
      <div class="card" data-rid="${escapeHtml(r.id)}">
        <div class="card-cover">${(r.title || "?").charAt(0)}</div>
        <div class="card-body">
          <div class="card-title">${escapeHtml(r.title || "Untitled")}</div>
          <div class="card-desc">${escapeHtml((r.description || "").slice(0, 110))}${(r.description || "").length > 110 ? "…" : ""}</div>
          <div class="card-meta">
            ${r.totalMinutes ? `<span>⏱ ${r.totalMinutes} min</span>` : ""}
            ${r.servings ? `<span>🍽 ${r.servings}</span>` : ""}
            ${r.difficulty ? `<span>📊 ${escapeHtml(r.difficulty)}</span>` : ""}
            ${r.author ? `<span>· ${escapeHtml(r.author)}</span>` : ""}
          </div>
          ${(r.tags || []).length > 0 ? `<div style="margin-top:8px;display:flex;flex-wrap:wrap;gap:4px">${(r.tags || []).slice(0, 4).map(t => `<span class="card-tag">${escapeHtml(t)}</span>`).join("")}</div>` : ""}
        </div>
      </div>`).join("")}</div>`;
    gridHost.querySelectorAll(".card[data-rid]").forEach(c => c.addEventListener("click", () => openRecipe(c.dataset.rid)));
  }).catch(e => { gridHost.innerHTML = `<div class="empty"><div class="empty-icon">⚠️</div><h2>Couldn't load</h2><p>${escapeHtml(e.message || "")}</p></div>`; });
}

async function runGenerate() {
  const prompt = document.getElementById("prompt").value.trim();
  if (!prompt) return showToast("Type a recipe idea first", 2500, "info");
  const btn = document.getElementById("go-btn");
  btn.disabled = true; btn.innerHTML = `<span class="spinner"></span> Cooking…`;
  const progress = startProgress(document.getElementById("compose-progress"), "gen");
  try {
    const recipe = await genRecipe(prompt);
    const saved = await saveRecipe(recipe);
    progress.done();
    showToast("Saved to public library", 2500, "success");
    document.getElementById("prompt").value = "";
    openRecipe(saved.id);
  } catch (e) {
    progress.fail(); showToast(e.message || "Failed", 5000, "error");
    btn.disabled = false; btn.textContent = "Generate";
  }
}
async function runImport() {
  const url = document.getElementById("prompt").value.trim();
  if (!url) return showToast("Paste a URL first", 2500, "info");
  const btn = document.getElementById("go-btn");
  btn.disabled = true; btn.innerHTML = `<span class="spinner"></span> Importing…`;
  const progress = startProgress(document.getElementById("compose-progress"), "import");
  try {
    const recipe = await importUrl(url);
    const saved = await saveRecipe(recipe);
    progress.done();
    showToast("Imported + saved", 2500, "success");
    document.getElementById("prompt").value = "";
    openRecipe(saved.id);
  } catch (e) {
    progress.fail(); showToast(e.message || "Failed", 5000, "error");
    btn.disabled = false; btn.textContent = "Import";
  }
}

async function openRecipe(id) {
  view = "recipe";
  document.getElementById("main").innerHTML = `<div class="empty"><div class="spinner"></div></div>`;
  try {
    currentRecipe = await getRecipe(id);
    if (!currentRecipe) throw new Error("Not found");
    render();
  } catch (e) {
    showToast(e.message || "Failed", 4000, "error");
    view = "library"; render();
  }
}

function renderRecipe(el) {
  const r = currentRecipe;
  el.innerHTML = `
    <div style="margin-bottom:14px"><button class="btn-ghost" id="back">← All recipes</button></div>
    <div class="recipe-page">
      <div class="recipe-hero">
        <div class="recipe-title">${escapeHtml(r.title)}</div>
        <div class="recipe-desc">${escapeHtml(r.description || "")}</div>
        <div class="recipe-stats">
          ${r.prepMinutes ? `<span class="stat">Prep <strong>${r.prepMinutes}m</strong></span>` : ""}
          ${r.cookMinutes ? `<span class="stat">Cook <strong>${r.cookMinutes}m</strong></span>` : ""}
          ${r.totalMinutes ? `<span class="stat">Total <strong>${r.totalMinutes}m</strong></span>` : ""}
          ${r.servings ? `<span class="stat">Serves <strong>${r.servings}</strong></span>` : ""}
          ${r.difficulty ? `<span class="stat">${escapeHtml(r.difficulty)}</span>` : ""}
          ${r.cuisine ? `<span class="stat">${escapeHtml(r.cuisine)}</span>` : ""}
        </div>
        ${(r.tags || []).length ? `<div class="recipe-tags">${(r.tags || []).map(t => `<span class="card-tag">${escapeHtml(t)}</span>`).join("")}</div>` : ""}
      </div>
      <div class="recipe-body">
        <div>
          <div class="section-title">Ingredients</div>
          <ul class="ingredients" style="list-style:none;padding:0;margin:0">
            ${(r.ingredients || []).map(i => `<li><span class="ing-qty">${escapeHtml(i.qty || "")}${i.unit ? " " + escapeHtml(i.unit) : ""}</span>${escapeHtml(i.name || "")}${i.notes ? `<span class="ing-notes">— ${escapeHtml(i.notes)}</span>` : ""}</li>`).join("")}
          </ul>
          ${(r.equipment || []).length ? `<div class="section-title" style="margin-top:18px">Equipment</div><ul class="equipment" style="list-style:none;padding:0;margin:0">${r.equipment.map(e => `<li>${escapeHtml(e)}</li>`).join("")}</ul>` : ""}
          ${r.nutritionPerServing ? `<div class="section-title" style="margin-top:18px">Per serving</div><div style="font-size:13px;display:grid;gap:4px"><span>${r.nutritionPerServing.calories || "?"} cal</span><span>${r.nutritionPerServing.proteinG || "?"}g protein</span><span>${r.nutritionPerServing.carbsG || "?"}g carbs</span><span>${r.nutritionPerServing.fatG || "?"}g fat</span></div>` : ""}
        </div>
        <div>
          <div class="section-title">Steps</div>
          <ol class="steps">${(r.steps || []).map(s => `<li>${escapeHtml(s)}</li>`).join("")}</ol>
          ${(r.tips || []).length ? `<div class="section-title" style="margin-top:18px">Tips</div><ul class="tips" style="list-style:none;padding:0;margin:0">${r.tips.map(t => `<li>💡 ${escapeHtml(t)}</li>`).join("")}</ul>` : ""}
          ${r.sourceUrl ? `<div style="margin-top:18px;font-size:12px;color:var(--muted)">Imported from <a href="${escapeHtml(r.sourceUrl)}" target="_blank" rel="noopener">${escapeHtml(r.sourceUrl)}</a></div>` : ""}
        </div>
      </div>
      <div class="recipe-actions">
        <button class="btn btn-secondary" id="edit-btn">✎ Edit</button>
        <button class="btn btn-secondary" id="print-btn">🖨 Print</button>
        <button class="btn btn-secondary" id="share-btn">🔗 Share</button>
        <div style="flex:1"></div>
        <button class="btn-ghost" id="del-btn" style="color:#dc2626">Delete</button>
      </div>
      <div class="refine-shell">
        <div class="section-title">↻ Ask AI to change something</div>
        <div style="font-size:12px;color:var(--muted)">e.g. "make it vegan", "double the servings", "less sweet", "use chicken instead of beef"</div>
        <div class="refine-input-row">
          <input type="text" id="refine-input" placeholder="What to change?" />
          <button class="btn btn-secondary" id="refine-btn">Apply</button>
        </div>
        <div class="refine-suggestions">
          ${["Make it vegan", "Double servings", "Half the time", "Less sweet", "Add more vegetables", "Gluten-free"].map(s => `<button class="ex-chip" data-suggest="${escapeHtml(s)}">${escapeHtml(s)}</button>`).join("")}
        </div>
        <div id="refine-progress"></div>
      </div>
    </div>
  `;
  document.getElementById("back").addEventListener("click", () => { view = "library"; render(); });
  document.getElementById("edit-btn").addEventListener("click", () => { view = "edit"; render(); });
  document.getElementById("print-btn").addEventListener("click", () => window.print());
  document.getElementById("share-btn").addEventListener("click", async () => {
    const url = location.href.split("?")[0] + "?r=" + encodeURIComponent(r.id);
    try { await navigator.clipboard.writeText(url); showToast("Link copied to clipboard", 2500, "success"); }
    catch { showToast(url, 5000); }
  });
  document.getElementById("del-btn").addEventListener("click", async () => {
    if (!confirm(`Delete "${r.title}" permanently? It's public — anyone could have saved it.`)) return;
    try { await deleteRecipe(r.id); showToast("Deleted", 2000, "success"); view = "library"; render(); }
    catch (e) { showToast(e.message || "Failed", 4000, "error"); }
  });
  document.querySelectorAll("[data-suggest]").forEach(b => b.addEventListener("click", () => { document.getElementById("refine-input").value = b.dataset.suggest; document.getElementById("refine-input").focus(); }));
  const rbtn = document.getElementById("refine-btn");
  async function doRefine() {
    const inp = document.getElementById("refine-input");
    const text = inp.value.trim();
    if (!text) return;
    rbtn.disabled = true; rbtn.innerHTML = `<span class="spinner"></span>`;
    const progress = startProgress(document.getElementById("refine-progress"), "refine");
    try {
      const refined = await refineRecipe(currentRecipe, text);
      refined.id = currentRecipe.id; // keep same id
      const saved = await saveRecipe(refined, "update");
      currentRecipe = saved;
      progress.done(); inp.value = ""; render();
      showToast("Recipe updated", 2500, "success");
    } catch (e) {
      progress.fail(); showToast(e.message || "Failed", 4000, "error");
      rbtn.disabled = false; rbtn.textContent = "Apply";
    }
  }
  rbtn.addEventListener("click", doRefine);
  document.getElementById("refine-input").addEventListener("keydown", e => { if (e.key === "Enter") doRefine(); });
}

function renderEdit(el) {
  const r = currentRecipe;
  el.innerHTML = `
    <div style="margin-bottom:14px"><button class="btn-ghost" id="back">← Cancel</button></div>
    <div class="recipe-page">
      <div class="recipe-hero">
        <div class="recipe-title">Editing — ${escapeHtml(r.title)}</div>
      </div>
      <div class="edit-shell">
        <div class="edit-row"><label>Title</label><input type="text" id="e-title" value="${escapeHtml(r.title)}" /></div>
        <div class="edit-row"><label>Description</label><textarea id="e-desc" rows="2">${escapeHtml(r.description || "")}</textarea></div>
        <div class="edit-row"><label>Cuisine</label><input type="text" id="e-cuisine" value="${escapeHtml(r.cuisine || "")}" /></div>
        <div class="edit-row"><label>Servings</label><input type="number" id="e-serv" value="${r.servings || ""}" /></div>
        <div class="edit-row"><label>Prep (min)</label><input type="number" id="e-prep" value="${r.prepMinutes || ""}" /></div>
        <div class="edit-row"><label>Cook (min)</label><input type="number" id="e-cook" value="${r.cookMinutes || ""}" /></div>
        <div class="edit-row"><label>Tags</label><input type="text" id="e-tags" value="${escapeHtml((r.tags || []).join(", "))}" placeholder="comma, separated, tags" /></div>
        <div class="section-title" style="margin-top:14px">Ingredients (one per line: qty | unit | name | notes)</div>
        <textarea id="e-ings" rows="8" style="width:100%;padding:10px;border:1px solid var(--border);border-radius:8px;background:var(--bg);font-family:ui-monospace,Menlo,monospace;font-size:12px">${(r.ingredients || []).map(i => `${i.qty || ""} | ${i.unit || ""} | ${i.name || ""} | ${i.notes || ""}`).join("\n")}</textarea>
        <div class="section-title" style="margin-top:14px">Steps (one per line)</div>
        <textarea id="e-steps" rows="8" style="width:100%;padding:10px;border:1px solid var(--border);border-radius:8px;background:var(--bg);font-size:13px">${(r.steps || []).join("\n")}</textarea>
        <div class="section-title" style="margin-top:14px">Tips (one per line, optional)</div>
        <textarea id="e-tips" rows="3" style="width:100%;padding:10px;border:1px solid var(--border);border-radius:8px;background:var(--bg);font-size:13px">${(r.tips || []).join("\n")}</textarea>
        <div style="display:flex;gap:8px;justify-content:flex-end;margin-top:18px">
          <button class="btn btn-secondary" id="cancel-btn">Cancel</button>
          <button class="btn btn-primary" id="save-btn">Save changes</button>
        </div>
      </div>
    </div>
  `;
  document.getElementById("back").addEventListener("click", () => { view = "recipe"; render(); });
  document.getElementById("cancel-btn").addEventListener("click", () => { view = "recipe"; render(); });
  document.getElementById("save-btn").addEventListener("click", async () => {
    const updated = {
      ...r,
      title: document.getElementById("e-title").value.trim(),
      description: document.getElementById("e-desc").value.trim(),
      cuisine: document.getElementById("e-cuisine").value.trim(),
      servings: Number(document.getElementById("e-serv").value) || r.servings,
      prepMinutes: Number(document.getElementById("e-prep").value) || r.prepMinutes,
      cookMinutes: Number(document.getElementById("e-cook").value) || r.cookMinutes,
      totalMinutes: (Number(document.getElementById("e-prep").value) || 0) + (Number(document.getElementById("e-cook").value) || 0) || r.totalMinutes,
      tags: document.getElementById("e-tags").value.split(",").map(x => x.trim()).filter(Boolean),
      ingredients: document.getElementById("e-ings").value.split("\n").filter(l => l.trim()).map(line => {
        const parts = line.split("|").map(s => s.trim());
        return { qty: parts[0] || "", unit: parts[1] || "", name: parts[2] || "", notes: parts[3] || "" };
      }),
      steps: document.getElementById("e-steps").value.split("\n").map(s => s.trim()).filter(Boolean),
      tips: document.getElementById("e-tips").value.split("\n").map(s => s.trim()).filter(Boolean),
    };
    try {
      const saved = await saveRecipe(updated, "update");
      currentRecipe = saved;
      showToast("Saved", 2000, "success");
      view = "recipe"; render();
    } catch (e) { showToast(e.message || "Save failed", 4000, "error"); }
  });
}

function renderAuth(el) {
  let mode = "signin";
  function paint(err) {
    el.innerHTML = `
      <div style="max-width:420px;margin:60px auto"><div class="recipe-page" style="padding:28px">
        <div class="page-title" style="font-size:22px;margin-bottom:6px">${mode === "signin" ? "Sign in" : "Create account"}</div>
        <div style="font-size:13px;color:var(--muted);margin-bottom:14px">Your Knox account works here too. Sign in to be credited as the author when you save recipes.</div>
        ${err ? `<div style="color:#991b1b;background:#fee2e2;border:1px solid #fca5a5;padding:8px 12px;border-radius:8px;font-size:12px;margin-bottom:10px">${escapeHtml(err)}</div>` : ""}
        <form id="auth-form"><div style="margin-bottom:10px"><label style="font-size:11px;color:var(--muted)">Email or phone</label><input type="text" name="identifier" required autocomplete="username" style="width:100%;padding:9px 12px;border-radius:8px;border:1px solid var(--border);background:var(--bg);font-size:13px;margin-top:3px" /></div><div style="margin-bottom:14px"><label style="font-size:11px;color:var(--muted)">Password</label><input type="password" name="password" required minlength="6" autocomplete="${mode === "signin" ? "current-password" : "new-password"}" style="width:100%;padding:9px 12px;border-radius:8px;border:1px solid var(--border);background:var(--bg);font-size:13px;margin-top:3px" /></div><button class="btn btn-primary" type="submit" style="width:100%">${mode === "signin" ? "Sign in" : "Create account"}</button></form>
        <div style="text-align:center;font-size:12px;color:var(--muted);margin-top:12px">${mode === "signin" ? `No account? <a id="to-create" style="cursor:pointer">Create one</a>` : `Have one? <a id="to-signin" style="cursor:pointer">Sign in</a>`} · <a id="back-lib" style="cursor:pointer">Back to library</a></div>
      </div></div>
    `;
    document.getElementById("to-create")?.addEventListener("click", () => { mode = "create"; paint(); });
    document.getElementById("to-signin")?.addEventListener("click", () => { mode = "signin"; paint(); });
    document.getElementById("back-lib").addEventListener("click", () => { view = "library"; render(); });
    document.getElementById("auth-form").addEventListener("submit", async (e) => {
      e.preventDefault();
      const fd = new FormData(e.target);
      try {
        if (mode === "signin") await login(fd.get("identifier"), fd.get("password"));
        else await createAccount(fd.get("identifier"), fd.get("password"));
        showToast("Signed in", 2000, "success");
        view = "library"; render();
      } catch (ex) { paint(ex.message); }
    });
  }
  paint();
}

// search input
document.getElementById("search").addEventListener("input", (e) => {
  searchQuery = e.target.value;
  clearTimeout(window._st);
  window._st = setTimeout(() => { if (view === "library") render(); }, 250);
});
document.getElementById("brand").addEventListener("click", () => { view = "library"; searchQuery = ""; document.getElementById("search").value = ""; render(); });

// deep link ?r=recipe-id
const params = new URLSearchParams(location.search);
if (params.get("r")) {
  openRecipe(params.get("r"));
} else {
  render();
}
</script>
